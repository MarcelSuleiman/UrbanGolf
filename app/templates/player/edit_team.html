{% extends "base.html" %}

{% block title %}Upraviť tím – Urban Golf BA{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="{{ url_for('player.teams') }}" class="text-gray-400 hover:text-white text-sm">← Späť na tímy</a>
    </div>

    <h1 class="text-3xl font-bold mb-6">Upraviť tím</h1>

    <form method="POST" class="bg-gray-800 rounded-lg p-6">

        <div class="mb-6">
            <label for="team_name" class="block text-sm font-medium text-gray-300 mb-2">
                Názov tímu
            </label>
            <input type="text" id="team_name" name="team_name" required maxlength="100"
                   value="{{ team.name }}"
                   class="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 text-white focus:outline-none focus:border-green-500">
        </div>

        <div class="flex items-center justify-between mb-3">
            <h3 class="text-lg font-medium text-gray-300">Členovia tímu</h3>
            <span id="member-count" class="text-sm text-gray-500"></span>
        </div>
        <p class="text-sm text-gray-500 mb-4">Minimálne 2 hráči. Všetci musia byť zaregistrovaní.</p>

        <div id="members-list" class="space-y-3 mb-4">
            {% for member in team.members %}
                <div class="member-row flex items-center gap-2">
                    <select name="member"
                            class="flex-1 bg-gray-700 border border-gray-600 rounded px-4 py-2 text-white focus:outline-none focus:border-green-500">
                        <option value="">— vyber hráča —</option>
                        {% for p in players %}
                            <option value="{{ p.name }}"
                                {% if p.id == member.player_id %}selected{% endif %}>
                                {{ p.name }}
                            </option>
                        {% endfor %}
                    </select>
                    <button type="button" class="remove-btn text-gray-600 hover:text-red-400 px-2 py-2 text-xl leading-none" title="Odstrániť">×</button>
                </div>
            {% endfor %}
        </div>

        <button type="button" id="add-member"
                class="w-full border border-dashed border-gray-600 hover:border-green-500 hover:text-green-400 text-gray-400 py-2 rounded text-sm mb-6 transition-colors">
            + Pridať ďalšieho hráča
        </button>

        <div class="flex gap-3">
            <button type="submit"
                    class="flex-1 bg-green-600 hover:bg-green-500 py-3 rounded font-bold text-lg">
                Uložiť zmeny
            </button>
            <a href="{{ url_for('player.teams') }}"
               class="px-6 py-3 rounded bg-gray-700 hover:bg-gray-600 font-medium text-center">
                Zrušiť
            </a>
        </div>
    </form>
</div>

<script>
(function () {
    const list = document.getElementById('members-list');
    const addBtn = document.getElementById('add-member');
    const countLabel = document.getElementById('member-count');

    const playerOptions = `<option value="">— vyber hráča —</option>` +
        Array.from(list.querySelectorAll('select')[0].options)
             .slice(1)
             .map(o => `<option value="${o.value}">${o.text}</option>`)
             .join('');

    function countLabel_text(n) {
        if (n === 1) return '1 hráč';
        if (n >= 2 && n <= 4) return n + ' hráči';
        return n + ' hráčov';
    }

    function updateUI() {
        const rows = list.querySelectorAll('.member-row');
        const n = rows.length;
        countLabel.textContent = countLabel_text(n);
        rows.forEach(row => {
            const btn = row.querySelector('.remove-btn');
            btn.classList.toggle('invisible', n <= 2);
        });
    }

    function buildRow() {
        const div = document.createElement('div');
        div.className = 'member-row flex items-center gap-2';
        div.innerHTML = `
            <select name="member"
                    class="flex-1 bg-gray-700 border border-gray-600 rounded px-4 py-2 text-white focus:outline-none focus:border-green-500">
                ${playerOptions}
            </select>
            <button type="button" class="remove-btn text-gray-600 hover:text-red-400 px-2 py-2 text-xl leading-none" title="Odstrániť">×</button>
        `;
        div.querySelector('.remove-btn').addEventListener('click', () => { div.remove(); updateUI(); });
        return div;
    }

    list.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', () => { btn.closest('.member-row').remove(); updateUI(); });
    });

    addBtn.addEventListener('click', () => { list.appendChild(buildRow()); updateUI(); });

    updateUI();
})();
</script>
{% endblock %}
