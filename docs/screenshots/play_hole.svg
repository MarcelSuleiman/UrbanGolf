<svg width="960" height="680" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Tahoma,Geneva,Verdana,sans-serif">
  <rect width="960" height="680" fill="#111827"/>

  <!-- NAV -->
  <rect width="960" height="58" fill="#14532d"/>
  <text x="22" y="37" fill="white" font-size="20" font-weight="700">⛳ Urban Golf BA</text>
  <text x="760" y="37" fill="#bbf7d0" font-size="13">Marcel</text>
  <text x="826" y="37" fill="#bbf7d0" font-size="13">Odhlásiť</text>

  <!-- Breadcrumb & progress -->
  <text x="40" y="80" fill="#6b7280" font-size="12">Sad Janka Kráľa  ›  Kolo  ›  Jamka 7 z 9</text>
  <!-- Progress bar -->
  <rect x="40" y="88" width="880" height="6" rx="3" fill="#374151"/>
  <rect x="40" y="88" width="693" height="6" rx="3" fill="#16a34a"/>

  <!-- Hole title -->
  <text x="40" y="122" fill="white" font-size="22" font-weight="700">Jamka 7 — Janko Kráľ (socha básnika)</text>
  <rect x="40" y="130" width="56" height="22" rx="11" fill="#14532d"/>
  <text x="68" y="145" fill="#86efac" font-size="11" text-anchor="middle">Par 8</text>
  <text x="110" y="145" fill="#9ca3af" font-size="12">Štart: Chodník pri vstupe do parku</text>

  <!-- MAP (left) -->
  <rect x="40" y="162" width="560" height="300" rx="12" fill="#3d4f61"/>
  <!-- Park green -->
  <rect x="40" y="162" width="560" height="300" rx="12" fill="#2d4a35"/>
  <!-- Paths -->
  <line x1="40" y1="280" x2="600" y2="280" stroke="#4a6040" stroke-width="3"/>
  <line x1="200" y1="162" x2="200" y2="462" stroke="#4a6040" stroke-width="2"/>
  <line x1="420" y1="162" x2="420" y2="462" stroke="#4a6040" stroke-width="2"/>
  <line x1="40" y1="360" x2="600" y2="360" stroke="#4a6040" stroke-width="2"/>
  <!-- Trees (circles) -->
  <circle cx="150" cy="200" r="14" fill="#1a3d1a" opacity="0.7"/>
  <circle cx="280" cy="190" r="12" fill="#1a3d1a" opacity="0.7"/>
  <circle cx="460" cy="210" r="16" fill="#1a3d1a" opacity="0.7"/>
  <circle cx="120" cy="340" r="12" fill="#1a3d1a" opacity="0.7"/>
  <circle cx="500" cy="340" r="10" fill="#1a3d1a" opacity="0.7"/>
  <circle cx="350" cy="400" r="14" fill="#1a3d1a" opacity="0.7"/>
  <!-- Route line -->
  <line x1="160" y1="420" x2="380" y2="240" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="8,4"/>
  <!-- Start marker -->
  <circle cx="160" cy="420" r="14" fill="#16a34a" stroke="white" stroke-width="2.5"/>
  <text x="160" y="425" fill="white" font-size="10" font-weight="700" text-anchor="middle">S</text>
  <!-- Target marker -->
  <circle cx="380" cy="240" r="14" fill="#dc2626" stroke="white" stroke-width="2.5"/>
  <text x="380" y="245" fill="white" font-size="13" text-anchor="middle">⛳</text>
  <!-- Statue label popup -->
  <rect x="390" y="190" width="180" height="46" rx="6" fill="white"/>
  <polygon points="410,236 430,236 420,250" fill="white"/>
  <text x="400" y="208" fill="#1f2937" font-size="11" font-weight="700">Janko Kráľ – socha</text>
  <text x="400" y="224" fill="#dc2626" font-size="10">Cieľ: Podstavec sochy</text>
  <!-- Map attribution -->
  <text x="590" y="456" fill="#718096" font-size="9" text-anchor="end">© OpenStreetMap | Leaflet</text>

  <!-- BONUSES panel (right top) -->
  <rect x="620" y="162" width="300" height="168" rx="10" fill="#1f2937"/>
  <text x="640" y="186" fill="white" font-size="13" font-weight="700">Bonusy a penalizácie</text>
  <line x1="640" y1="192" x2="900" y2="192" stroke="#374151" stroke-width="1"/>
  <!-- bonus rows -->
  <rect x="640" y="198" width="260" height="28" rx="5" fill="#14532d"/>
  <text x="652" y="216" fill="#4ade80" font-size="12">Podstavec sochy</text>
  <text x="888" y="216" fill="#4ade80" font-size="12" text-anchor="end">-4 bodov</text>
  <rect x="640" y="232" width="260" height="28" rx="5" fill="#14532d"/>
  <text x="652" y="250" fill="#4ade80" font-size="12">Figúra sochy</text>
  <text x="888" y="250" fill="#4ade80" font-size="12" text-anchor="end">-6 bodov</text>
  <rect x="640" y="266" width="260" height="28" rx="5" fill="#14532d"/>
  <text x="652" y="284" fill="#4ade80" font-size="12">Headshot (hlava sochy)</text>
  <text x="888" y="284" fill="#4ade80" font-size="12" text-anchor="end">-12 bodov</text>
  <rect x="640" y="300" width="260" height="28" rx="5" fill="#7f1d1d"/>
  <text x="652" y="318" fill="#fca5a5" font-size="12">Chodec</text>
  <text x="888" y="318" fill="#fca5a5" font-size="12" text-anchor="end">+2 bodov</text>

  <!-- SCORE FORM (right bottom) -->
  <rect x="620" y="344" width="300" height="250" rx="10" fill="#1f2937"/>
  <text x="640" y="368" fill="white" font-size="13" font-weight="700">Zaznamenaj skóre</text>
  <line x1="640" y1="374" x2="900" y2="374" stroke="#374151" stroke-width="1"/>
  <!-- Strokes -->
  <text x="640" y="398" fill="#9ca3af" font-size="11">Počet úderov</text>
  <rect x="640" y="404" width="260" height="34" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="656" y="426" fill="#d1d5db" font-size="15">8</text>
  <!-- Bonus -->
  <text x="640" y="454" fill="#9ca3af" font-size="11">Bonus (počet bodov)</text>
  <rect x="640" y="460" width="260" height="34" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="656" y="482" fill="#4ade80" font-size="15">6</text>
  <!-- Penalty -->
  <text x="640" y="510" fill="#9ca3af" font-size="11">Penalizácia (počet bodov)</text>
  <rect x="640" y="516" width="260" height="34" rx="6" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <text x="656" y="538" fill="#fca5a5" font-size="15">0</text>
  <!-- Notes -->
  <text x="640" y="564" fill="#9ca3af" font-size="11">Poznámka (nepovinné)</text>
  <rect x="640" y="570" width="260" height="16" rx="4" fill="#374151" stroke="#4b5563" stroke-width="1"/>
  <!-- Submit -->
  <rect x="640" y="556" width="260" height="32" rx="7" fill="#16a34a"/>
  <text x="770" y="576" fill="white" font-size="13" font-weight="700" text-anchor="middle">Uložiť a ďalšia jamka →</text>

  <!-- Hole description bar -->
  <rect x="40" y="472" width="560" height="52" rx="8" fill="#1f2937"/>
  <text x="60" y="494" fill="#9ca3af" font-size="12">📍 Štart: Chodník pri vstupe do parku (pri moste)</text>
  <text x="60" y="512" fill="#9ca3af" font-size="12">⛳ Cieľ: Podstavec sochy Janka Kráľa</text>

  <!-- Score summary bar -->
  <rect x="40" y="534" width="560" height="52" rx="8" fill="#374151"/>
  <text x="60" y="556" fill="#9ca3af" font-size="11">Priebežné skóre tohto kola</text>
  <text x="60" y="578" fill="white" font-size="20" font-weight="700">38</text>
  <text x="120" y="578" fill="#9ca3af" font-size="12">z 7 jamiek · Par 44 doteraz</text>
  <rect x="420" y="544" width="160" height="30" rx="6" fill="#dc2626" opacity="0.2"/>
  <text x="500" y="564" fill="#fca5a5" font-size="12" text-anchor="middle">+6 nad par (−6)</text>

  <!-- Footer -->
  <rect y="650" width="960" height="30" fill="#1f2937"/>
  <text x="480" y="669" fill="#6b7280" font-size="12" text-anchor="middle">Urban Golf Bratislava © 2026</text>
</svg>
